<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Reservation System</title>
    <style>
        :root {
            --primary: #0f4c81;
            --primary-dark: #0a3561;
            --accent: #f2b138;
            --bg: #f4f7fb;
            --card: #ffffff;
            --text: #1e2d48;
            --muted: #4f5f7b;
            --radius: 10px;
            --shadow: 0 8px 22px rgba(0,0,0,0.08);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(180deg, #eaf1fb 0%, #f8fbff 100%); color: var(--text); padding: 16px; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--card); padding: 24px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid #dae3f0; }
        .top-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; flex-wrap:wrap; gap:10px; }
        .top-row h1 { color: var(--primary-dark); font-size: 1.5rem; text-align:center; margin:0; }
        .back-btn { text-decoration:none; background: var(--primary); color:white; font-weight:700; padding: 8px 14px; border-radius: 8px; border:1px solid rgba(255,255,255,0.2); }
        .back-btn:hover { background: #0a3561; }
        .booking-form { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 26px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: 700; margin-bottom: 6px; color: #1e2d48; font-size: 14px; }
        input, select { padding: 10px 12px; border: 1px solid #c9d6e8; border-radius: 6px; font-size: 14px; background:#fff; }
        button, .book-btn { grid-column:1/-1; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 15px; }
        button:hover, .book-btn:hover { background: #0a3561; }
        .rooms-section { margin-top: 30px; }
        .rooms-section h2 { color: var(--primary-dark); margin-bottom: 14px; font-size: 1.3rem; }
        .room-card { border: 1px solid #dce6f5; border-radius: 10px; padding: 12px; margin-bottom: 16px; background: #f9fbff; box-shadow: 0 3px 10px rgba(16, 38, 79, 0.05); }
        .room-image { width:100%; height:170px; border-radius: 8px; object-fit:cover; margin-bottom:10px; border:1px solid #d3dff0; }
        .room-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:10px; }
        .room-name { font-size:1.15rem; color:#0b3f74; font-weight:700; }
        .room-price { color:#0f7e4f; font-weight:700; }
        .room-features { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin: 10px 0; }
        .feature { font-size: 13px; color: #405674; }
        .availability { padding: 8px 10px; border-radius: 6px; font-weight:700; margin: 10px 0; display:inline-block; }
        .available { background: #e8f7eb; color: #1f7a42; }
        .unavailable { background: #fdecee; color:#8c1f2f; }
        .summary { background:#eef5ff; border-left: 4px solid #0f4c81; padding:16px; border-radius: 8px; margin-top: 24px; }
        .summary-row { display:flex; justify-content:space-between; margin-bottom: 8px; font-size: 15px; color:#2f3d5d; }
        .summary-total { font-size:1.2rem; font-weight:700; color:#0f4c81; border-top:1px dashed #0f4c81; padding-top:8px; margin-top:8px; }
        @media (max-width: 820px) { .booking-form { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <a href="index.html" style="text-decoration:none; background:#007bff; color:white; border-radius:6px; padding:8px 12px; font-weight:700;">← Back to Home</a>
            <h1 style="margin:0; font-size:1.4rem;">🏨 Hotel Reservation System</h1>
        </div>

        <form class="booking-form" id="bookingForm">
            <div class="form-group">
                <label for="checkIn">Check-in Date:</label>
                <input type="date" id="checkIn" name="checkIn" required>
            </div>
            <div class="form-group">
                <label for="checkOut">Check-out Date:</label>
                <input type="date" id="checkOut" name="checkOut" required>
            </div>
            <div class="form-group">
                <label for="guests">Number of Guests:</label>
                <input type="number" id="guests" name="guests" min="1" max="10" value="1" required>
            </div>
            <div class="form-group">
                <label for="rooms">Number of Rooms:</label>
                <input type="number" id="rooms" name="rooms" min="1" max="10" value="1" required>
            </div>
            <button type="submit">Search Availability</button>
        </form>

        <div class="rooms-section">
            <h2>Available Rooms</h2>
            <div id="roomList"></div>
        </div>

        <div class="summary" id="summary" style="display:none;">
            <h3>Booking Summary</h3>
            <div class="summary-row">
                <span>Check-in:</span>
                <span id="summaryCheckIn">-</span>
            </div>
            <div class="summary-row">
                <span>Check-out:</span>
                <span id="summaryCheckOut">-</span>
            </div>
            <div class="summary-row">
                <span>Number of Nights:</span>
                <span id="summaryNights">-</span>
            </div>
            <div class="summary-row">
                <span>Room Selected:</span>
                <span id="summaryRoom">-</span>
            </div>
            <div class="summary-row">
                <span>Price per Night:</span>
                <span id="summaryPrice">-</span>
            </div>
            <div class="summary-total">
                <span>Total Cost: $</span><span id="totalCost">0</span>
            </div>
            <button class="book-btn" onclick="confirmBooking()">Confirm Booking</button>
        </div>

        <div class="summary" id="contactForm" style="display:none; margin-top:20px;">
            <h3>Complete Contact Info</h3>
            <div class="form-group">
                <label for="contactName">Full Name:</label>
                <input id="contactName" type="text" placeholder="Enter full name" style="margin-top:6px; padding:8px; border:1px solid #c9d6e8; border-radius:6px; width:100%;" />
            </div>
            <div class="form-group" style="margin-top:10px;">
                <label for="contactPhone">Phone Number:</label>
                <input id="contactPhone" type="tel" placeholder="Enter phone number" style="margin-top:6px; padding:8px; border:1px solid #c9d6e8; border-radius:6px; width:100%;" />
            </div>
            <div class="form-group" style="margin-top:10px;">
                <label for="contactEmail">Email:</label>
                <input id="contactEmail" type="email" placeholder="Enter email" style="margin-top:6px; padding:8px; border:1px solid #c9d6e8; border-radius:6px; width:100%;" />
            </div>
            <button class="book-btn" onclick="submitContact()" style="margin-top:14px;">Submit Contact Info</button>
        </div>
    </div>

    <script>
        const rooms = [
            { id: 1, name: "Single Room", price: 79, features: ["Single Bed", "WiFi", "AC", "TV"], capacity: 1, photo: "https://www.hotelmonterey.co.jp/upload_file/monhtyo/stay/sng_600_001.jpg" },
            { id: 2, name: "Double Room", price: 119, features: ["Double Bed", "WiFi", "AC", "TV"], capacity: 2, photo: "https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=900&q=80" },
            { id: 3, name: "Deluxe Room", price: 159, features: ["King Bed", "WiFi", "Jacuzzi", "LCD TV", "Mini Bar"], capacity: 2, photo: "https://images.unsplash.com/photo-1493809842364-78817add7ffb?auto=format&fit=crop&w=900&q=80" },
            { id: 4, name: "Suite", price: 249, features: ["King Bed", "Living Area", "WiFi", "Spa", "Room Service"], capacity: 4, photo: "https://www.admiralhotelmanila.com/wp-content/uploads/sites/224/2021/11/Executive-Suite.jpg" }
        ];

        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            displayRooms();
        });

        function displayRooms() {
            const checkIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value;
            const guests = parseInt(document.getElementById('guests').value);
            const roomList = document.getElementById('roomList');

            if (!checkIn || !checkOut) {
                alert('Please select both dates');
                return;
            }

            roomList.innerHTML = '';
            rooms.forEach(room => {
                if (room.capacity >= guests) {
                    const roomCard = document.createElement('div');
                    roomCard.className = 'room-card';
                    roomCard.innerHTML = `
                        <img class="room-image" src="${room.photo}" alt="${room.name} interior">
                        <div class="room-header">
                            <div class="room-name">${room.name}</div>
                            <div class="room-price">$${room.price}/night</div>
                        </div>
                        <div class="availability available">✓ Available</div>
                        <div class="room-features">
                            ${room.features.map(f => `<div class="feature">• ${f}</div>`).join('')}
                        </div>
                        <button class="book-btn" onclick="selectRoom(${room.id}, '${room.name}', ${room.price})">Select Room</button>
                    `;
                    roomList.appendChild(roomCard);
                }
            });
        }

        function selectRoom(id, name, price) {
            const checkIn = document.getElementById('checkIn').value;
            const checkOut = document.getElementById('checkOut').value;
            const date1 = new Date(checkIn);
            const date2 = new Date(checkOut);
            const nights = Math.ceil((date2 - date1) / (1000 * 60 * 60 * 24));
            const total = nights * price;

            document.getElementById('summaryCheckIn').textContent = checkIn;
            document.getElementById('summaryCheckOut').textContent = checkOut;
            document.getElementById('summaryNights').textContent = nights;
            document.getElementById('summaryRoom').textContent = name;
            document.getElementById('summaryPrice').textContent = '$' + price;
            document.getElementById('totalCost').textContent = total;
            document.getElementById('summary').style.display = 'block';

            window.scrollTo(0, document.body.scrollHeight);
        }

        function confirmBooking() {
            document.getElementById('contactForm').style.display = 'block';
            document.getElementById('summary').scrollIntoView({behavior: 'smooth', block: 'start'});
        }

        function submitContact() {
            const name = document.getElementById('contactName').value.trim();
            const phone = document.getElementById('contactPhone').value.trim();
            const email = document.getElementById('contactEmail').value.trim();
            if (!name || !phone || !email) {
                alert('Please fill in name, phone, and email.');
                return;
            }
            alert(`Booking confirmed!\nName: ${name}\nPhone: ${phone}\nEmail: ${email}`);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
